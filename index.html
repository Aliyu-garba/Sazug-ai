<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SAZUG AI Assistant | Multimodal Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    :root { --primary: #4f46e5; --primary-dark: #4338ca; --accent: #7c3aed; --bg-light: #f9fafb; --text-dark: #1f2937; --text-light: #6b7280; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; flex-direction: column; }
    .app-container { display: flex; height: 100vh; max-width: 1400px; margin: 0 auto; background: white; box-shadow: 0 20px 60px rgba(0,0,0,0.1); overflow: hidden; width: 100%; }
    .sidebar { width: 280px; background:#f8fafc; border-right:1px solid #e2e8f0; display:flex; flex-direction:column; transition:transform 0.3s ease; z-index:20; }
    .sidebar-header { padding:1.5rem; border-bottom:1px solid #e2e8f0; display:flex; align-items:center; gap:0.75rem; }
    .logo-circular { width:40px; height:40px; border-radius:50%; object-fit:cover; }
    .new-chat-btn { margin: 1rem; padding:0.75rem; border-radius:12px; background:var(--primary); color:white; border:none; cursor:pointer; font-weight:600; }
    .main-content { flex:1; display:flex; flex-direction:column; position:relative; background: #f9fafb; }
    .chat-messages { flex:1; overflow-y:auto; padding:1.5rem; display:flex; flex-direction:column; gap:1rem; }
    .message { max-width:80%; padding:0.8rem 1.2rem; border-radius:15px; margin-bottom: 5px; }
    .user-message { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
    .bot-message { align-self: flex-start; background: white; border: 1px solid #e2e8f0; border-bottom-left-radius: 2px; }
    .chat-input-container { padding: 1rem; background: white; border-top: 1px solid #e2e8f0; }
    .input-wrapper { display: flex; gap: 0.5rem; max-width: 800px; margin: 0 auto; }
    .chat-input { flex: 1; padding: 0.75rem; border: 1px solid #ddd; border-radius: 25px; outline: none; resize: none; }
    .send-button { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
    .preview-item { font-size: 0.8rem; background: #eee; padding: 5px 10px; border-radius: 10px; margin-bottom: 5px; display: inline-block; }
    @media (max-width: 768px) { .sidebar { display: none; } }
  </style>
</head>
<body>

<div class="app-container">
  <div class="sidebar">
    <div class="sidebar-header"><div class="sidebar-title">SAZUG AI</div></div>
    <button class="new-chat-btn" onclick="location.reload()">New Chat</button>
  </div>
  
  <div class="main-content">
    <div class="chat-messages" id="chatMessages">
      <div class="message bot-message">👋 Hello! I am the SAZUG AI. How can I help you today?</div>
    </div>
    
    <div class="chat-input-container">
      <div id="filePreview" style="padding-bottom: 5px;"></div>
      <div class="input-wrapper">
        <button onclick="document.getElementById('fileInput').click()" style="background:none; border:none; cursor:pointer; font-size:1.2rem; color:#666;">📎</button>
        <input type="file" id="fileInput" style="display:none" onchange="showPreview()">
        <textarea class="chat-input" id="chatInput" placeholder="Ask SAZUG AI..." rows="1"></textarea>
        <button class="send-button" id="sendButton" onclick="sendMessage()">🚀</button>
      </div>
    </div>
  </div>
</div>

<script>
  const chatMessages = document.getElementById('chatMessages');
  const chatInput = document.getElementById('chatInput');
  const fileInput = document.getElementById('fileInput');

  function showPreview() {
    const preview = document.getElementById('filePreview');
    if (fileInput.files.length > 0) {
      preview.innerHTML = `<div class="preview-item">Selected: ${fileInput.files[0].name} <span onclick="clearFile()" style="cursor:pointer; color:red;">✖</span></div>`;
    }
  }

  function clearFile() {
    fileInput.value = "";
    document.getElementById('filePreview').innerHTML = "";
  }

  async function sendMessage() {
    const text = chatInput.value.trim();
    const file = fileInput.files[0];
    if (!text && !file) return;

    // 1. Show User Message
    addMessage(text || "Sent an image", 'user');
    chatInput.value = "";
    clearFile();

    // 2. Show Thinking
    const thinkingDiv = addMessage("Thinking...", 'bot');

    // 3. Prepare Data for Render
    const formData = new FormData();
    formData.append('message', text);
    if (file) {
      formData.append('image', file);
    }

    try {
      // THIS IS YOUR NEW RENDER LINK
      const response = await fetch('https://sazug-ai.onrender.com/chat', {
        method: 'POST',
        body: formData
      });

      const data = await response.json();
      thinkingDiv.innerHTML = data.reply || data.error || "Sorry, I couldn't process that.";
    } catch (err) {
      thinkingDiv.innerHTML = "⚠️ Error connecting to SAZUG Brain. Make sure your Render service is Live!";
    }
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = `message ${sender}-message`;
    div.innerHTML = text;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return div;
  }
</script>
</body>
</html>
