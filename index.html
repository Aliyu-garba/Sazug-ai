<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SAZUG AI Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
    :root { --primary: #4f46e5; --bg-light: #f9fafb; }
    body { font-family: 'Inter', sans-serif; background: #667eea; height: 100vh; display: flex; flex-direction: column; }
    .app-container { display: flex; height: 100vh; max-width: 1400px; margin: 0 auto; background: white; width: 100%; overflow: hidden; }
    .main-content { flex: 1; display: flex; flex-direction: column; background: #f3f4f6; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .message { max-width: 80%; padding: 0.8rem 1.2rem; border-radius: 15px; }
    .user-message { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
    .bot-message { align-self: flex-start; background: white; border: 1px solid #e2e8f0; border-bottom-left-radius: 2px; }
    .input-container { padding: 1rem; background: white; border-top: 1px solid #e2e8f0; }
    .input-wrapper { display: flex; gap: 0.5rem; max-width: 800px; margin: 0 auto; align-items: center; }
    .chat-input { flex: 1; padding: 0.75rem; border: 1px solid #ddd; border-radius: 25px; outline: none; resize: none; }
    .send-btn { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
    .preview-box { font-size: 0.8rem; color: #444; padding: 5px; }
  </style>
</head>
<body>

<div class="app-container">
  <div class="main-content">
    <div class="chat-header p-4 bg-white border-b font-bold text-center">SAZUG AI ASSISTANT</div>
    
    <div class="chat-messages" id="chatMessages">
      <div class="message bot-message">👋 Hello! I am the SAZUG AI. Ask me about school fees, exams, or upload an image!</div>
    </div>
    
    <div class="input-container">
      <div id="fileName" class="preview-box"></div>
      <div class="input-wrapper">
        <button onclick="document.getElementById('fileInput').click()" class="text-gray-500 text-xl">📎</button>
        <input type="file" id="fileInput" style="display:none" onchange="updateFileLabel()">
        <textarea id="chatInput" class="chat-input" placeholder="Type a message..." rows="1"></textarea>
        <button class="send-btn" onclick="sendMessage()">🚀</button>
      </div>
    </div>
  </div>
</div>

<script>
  const chatMessages = document.getElementById('chatMessages');
  const chatInput = document.getElementById('chatInput');
  const fileInput = document.getElementById('fileInput');

  function updateFileLabel() {
    const label = document.getElementById('fileName');
    label.innerText = fileInput.files.length > 0 ? "Selected: " + fileInput.files[0].name : "";
  }

  async function sendMessage() {
    const text = chatInput.value.trim();
    const file = fileInput.files[0];
    if (!text && !file) return;

    // Show User Message
    addMessage(text || "Sent an image", 'user');
    chatInput.value = "";
    document.getElementById('fileName').innerText = "";

    // Show Thinking
    const thinkingDiv = addMessage("Thinking...", 'bot');

    // Prepare Data
    const formData = new FormData();
    formData.append('message', text); // Matches Backend
    if (file) {
      formData.append('image', file); // Matches Backend
    }

    try {
      // THE CORRECT ENDPOINT
      const response = await fetch('https://sazug-ai.onrender.com/chat', {
        method: 'POST',
        body: formData
      });

      const data = await response.json();
      thinkingDiv.innerHTML = data.reply || data.error || "No response from AI.";
    } catch (err) {
      thinkingDiv.innerHTML = "⚠️ Error: Could not connect to the AI server. Check if Render is Live.";
    }
    chatMessages.scrollTop = chatMessages.scrollHeight;
    fileInput.value = ""; // Reset file
  }

  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = `message ${sender}-message`;
    div.innerHTML = text;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return div;
  }
</script>

</body>
</html>
